<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>🧨 จุดประทัดเสี่ยงโชค</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{

  background:
    linear-gradient(
      rgba(20,0,0,.78),
      rgba(20,0,0,.88)
    ),
    url('dragon.png');

  background-size:cover;

  background-position:center;

  background-repeat:no-repeat;

  background-blend-mode:darken;

  animation:bgMove 20s linear infinite;

  width:100vw;
  height:100vh;

  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
}

/* พื้นหลังขยับ */

@keyframes bgMove{

  0%{
    background-position:center top;
  }

  50%{
    background-position:center bottom;
  }

  100%{
    background-position:center top;
  }
}

.container{

  width:100%;
  height:100vh;

  max-width:520px;

  padding:10px;

  text-align:center;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* หัว */

.title{

  font-size:38px;
  font-weight:bold;

  color:#ffd54f;

  text-shadow:
    0 0 10px orange,
    0 0 25px red;

  margin-bottom:10px;
}

/* แป๊ะยิ้ม */

.buddha{

  width:120px;

  margin-bottom:10px;

  filter:
    drop-shadow(0 0 15px gold);

  animation:
    float 3s ease-in-out infinite;
}

/* ลอย */

@keyframes float{

  0%{
    transform:translateY(0);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0);
  }
}

/* คำอธิษฐาน */

.sub{

  background:
    rgba(255,255,255,.06);

  border:
    1px solid rgba(255,255,255,.1);

  border-radius:20px;

  padding:14px;

  line-height:1.6;

  font-size:13px;

  text-align:left;

  max-height:120px;

  overflow:auto;

  backdrop-filter:blur(10px);

  margin-bottom:10px;
}

.sub::-webkit-scrollbar{
  width:5px;
}

.sub::-webkit-scrollbar-thumb{
  background:#ffd54f;
  border-radius:20px;
}

/* พื้นที่ประทัด */

.firecracker-wrap{

  width:300px;
  height:500px;

  position:relative;

  margin:auto;
}

/* กล่อง */

.big-box{

  position:absolute;

  top:0;
  left:50%;

  transform:translateX(-50%);

  width:190px;
  height:120px;

  border-radius:22px;

  background:
    linear-gradient(
      to bottom,
      #ff2d2d,
      #7f0000
    );

  border:5px solid #ffd54f;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:50px;
  font-weight:bold;

  color:#ffd54f;

  box-shadow:
    0 0 20px rgba(255,215,0,.5),
    inset 0 0 20px rgba(255,255,255,.1);

  transition:.4s;
}

/* แตก */

.big-box.break{

  opacity:0;

  transform:
    translateX(-50%)
    scale(1.8)
    rotate(15deg);

  filter:
    brightness(2)
    blur(6px);
}

/* เลข */

.big-number{

  position:absolute;

  top:5px;
  left:50%;

  transform:
    translateX(-50%)
    scale(.2);

  opacity:0;

  font-size:130px;
  font-weight:bold;

  color:#ffd54f;

  text-shadow:
    0 0 10px #fff,
    0 0 20px orange,
    0 0 40px red;

  transition:.4s;
}

.big-number.show{

  opacity:1;

  transform:
    translateX(-50%)
    scale(1);
}

/* ฉนวน */

.fuse{

  position:absolute;

  left:50%;
  top:90px;

  width:8px;
  height:340px;

  transform:translateX(-50%);

  border-radius:20px;

  background:
    repeating-linear-gradient(
      to bottom,
      #c49a6c 0px,
      #8b5a2b 8px,
      #5c3b1e 16px
    );

  box-shadow:
    inset 0 0 4px rgba(255,255,255,.2),
    0 0 8px rgba(0,0,0,.5);

  transition:.3s linear;
}

/* เชือก */

.line{

  position:absolute;

  left:50%;
  top:110px;

  width:6px;
  height:320px;

  transform:translateX(-50%);

  border-radius:20px;

  background:
    linear-gradient(
      to right,
      #111,
      #333,
      #111
    );

  transition:.3s linear;
}

/* ประทัด */

.cracker{

  width:52px;
  height:82px;

  position:absolute;

  border-radius:12px;

  border:3px solid #ffd54f;

  overflow:hidden;

  transition:.35s;

  box-shadow:
    0 8px 15px rgba(0,0,0,.45),
    inset 0 0 10px rgba(255,255,255,.15);
}

/* ลาย */

.cracker::before{

  content:'';

  position:absolute;
  inset:0;

  background:
    repeating-linear-gradient(
      to bottom,
      #ff2d2d 0px,
      #ff2d2d 12px,
      #b30000 12px,
      #b30000 24px
    );
}

/* อักษรจีน */

.cracker::after{

  content:'福';

  position:absolute;

  inset:0;

  display:flex;
  justify-content:center;
  align-items:center;

  color:#ffd54f;

  font-size:20px;
  font-weight:bold;
}

/* ระเบิด */

.cracker.hide{

  opacity:0;

  transform:
    scale(.1)
    rotate(180deg);

  filter:
    brightness(2)
    blur(5px);
}

/* ฝั่งซ้าย */

.left1{
  left:50px;
  top:120px;
  transform:rotate(28deg);
}

.left2{
  left:40px;
  top:200px;
  transform:rotate(28deg);
}

.left3{
  left:30px;
  top:280px;
  transform:rotate(28deg);
}

.left4{
  left:20px;
  top:360px;
  transform:rotate(28deg);
}

/* ฝั่งขวา */

.right1{
  right:50px;
  top:120px;
  transform:rotate(-28deg);
}

.right2{
  right:40px;
  top:200px;
  transform:rotate(-28deg);
}

.right3{
  right:30px;
  top:280px;
  transform:rotate(-28deg);
}

.right4{
  right:20px;
  top:360px;
  transform:rotate(-28deg);
}

/* ไฟ */

.spark{

  position:absolute;

  left:50%;
  top:390px;

  transform:translateX(-50%);

  width:24px;
  height:24px;

  border-radius:50%;

  display:none;

  background:
    radial-gradient(
      circle,
      #fff 0%,
      #ffd54f 30%,
      orange 60%,
      red 100%
    );

  box-shadow:
    0 0 10px #fff,
    0 0 20px orange,
    0 0 35px red;

  animation:
    fire .08s infinite alternate;
}

.spark.show{
  display:block;
}

.spark::before,
.spark::after{

  content:'';

  position:absolute;

  width:35px;
  height:3px;

  background:orange;

  top:50%;
  left:50%;

  transform:
    translate(-50%,-50%);

  border-radius:20px;
}

.spark::after{

  transform:
    translate(-50%,-50%)
    rotate(90deg);
}

@keyframes fire{

  from{
    transform:
      translateX(-50%)
      scale(1);

    opacity:.8;
  }

  to{
    transform:
      translateX(-50%)
      scale(1.35);

    opacity:1;
  }
}

/* ควัน */

.smoke{

  position:absolute;

  width:35px;
  height:35px;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,.7),
      rgba(255,255,255,.05)
    );

  border-radius:50%;

  filter:blur(6px);

  animation:
    smoke 1.2s linear forwards;
}

@keyframes smoke{

  from{

    opacity:1;

    transform:
      translateY(0)
      scale(1);
  }

  to{

    opacity:0;

    transform:
      translateY(-120px)
      scale(4);
  }
}

/* ปุ่ม */

button{

  margin-top:15px;

  border:none;

  padding:15px 40px;

  border-radius:20px;

  font-size:28px;
  font-weight:bold;

  color:white;

  cursor:pointer;

  background:
    linear-gradient(
      to bottom,
      #ff2d2d,
      #990000
    );

  box-shadow:
    0 10px 20px rgba(0,0,0,.4);

  transition:.2s;
}

button:hover{
  transform:scale(1.05);
}

button:disabled{
  opacity:.5;
}

/* ประวัติ */

.history{
  margin-top:20px;
}

.history-list{

  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;

  margin-top:10px;
}

.history-item{

  width:58px;
  height:58px;

  background:#ffd54f;

  color:#7f0000;

  border-radius:15px;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:28px;
  font-weight:bold;

  box-shadow:
    0 5px 15px rgba(0,0,0,.3);
}

</style>
</head>

<body>

<div class="container">

  <div class="title">
    🧨 จุดประทัดเสี่ยงโชค
  </div>

  <!-- แป๊ะยิ้ม -->

  <img
    src="laughing-buddha.png"
    class="buddha"
  >

  <div class="sub">

    “ข้าพเจ้า ชื่อ ....................................................

    วันนี้ได้ตั้งจิตอธิษฐานด้วยความเคารพและศรัทธา
    ขอจุดประทัดนี้เพื่อเสี่ยงทายเลขมงคล
    ขออำนาจแห่งสิ่งศักดิ์สิทธิ์ทั้งหลาย
    โปรดเปิดทางโชคลาภ เปิดทรัพย์ เปิดวาสนา
    ให้แก่ข้าพเจ้าและครอบครัว 🙏”

  </div>

  <div class="firecracker-wrap">

    <div class="big-box" id="bigBox">
      福
    </div>

    <div class="big-number" id="bigNumber">
      88
    </div>

    <div class="fuse" id="fuse"></div>

    <div class="line"></div>

    <div class="cracker left1"></div>
    <div class="cracker right1"></div>

    <div class="cracker left2"></div>
    <div class="cracker right2"></div>

    <div class="cracker left3"></div>
    <div class="cracker right3"></div>

    <div class="cracker left4"></div>
    <div class="cracker right4"></div>

    <div class="spark" id="spark"></div>

  </div>

  <button id="playBtn">
    จุดประทัด
  </button>

  <div class="history">

    <h2>เลขล่าสุด</h2>

    <div class="history-list" id="history"></div>

  </div>

</div>

<script>

const playBtn =
  document.getElementById('playBtn')

const spark =
  document.getElementById('spark')

const historyEl =
  document.getElementById('history')

const bigBox =
  document.getElementById('bigBox')

const bigNumber =
  document.getElementById('bigNumber')

const fuse =
  document.getElementById('fuse')

const line =
  document.querySelector('.line')

let playing = false

function randomNumber(){

  return Math.floor(Math.random()*100)
    .toString()
    .padStart(2,'0')
}

function createSmoke(x,y){

  const smoke =
    document.createElement('div')

  smoke.className = 'smoke'

  smoke.style.left = x + 'px'
  smoke.style.top = y + 'px'

  document.body.appendChild(smoke)

  setTimeout(()=>{
    smoke.remove()
  },1200)
}

const order = [
  'left4',
  'right4',
  'left3',
  'right3',
  'left2',
  'right2',
  'left1',
  'right1'
]

playBtn.onclick = ()=>{

  if(playing) return

  playing = true

  playBtn.disabled = true

  bigBox.classList.remove('break')

  bigNumber.classList.remove('show')

  fuse.style.clipPath =
    'inset(0 0 0 0)'

  line.style.clipPath =
    'inset(0 0 0 0)'

  document.querySelectorAll('.cracker')
    .forEach(c=>{
      c.classList.remove('hide')
    })

  spark.classList.add('show')

  let index = 0

  const interval = setInterval(()=>{

    if(index < order.length){

      const cracker =
        document.querySelector(
          '.' + order[index]
        )

      cracker.classList.add('hide')

      const rect =
        cracker.getBoundingClientRect()

      createSmoke(
        rect.left,
        rect.top
      )

      spark.style.top =
        cracker.offsetTop + 'px'

      const percent =
        ((index + 1)
        / order.length) * 100

      fuse.style.clipPath =
        `inset(0 0 ${percent}% 0)`

      line.style.clipPath =
        `inset(0 0 ${percent}% 0)`

      index++

    }else{

      clearInterval(interval)

      spark.style.top = '70px'

      setTimeout(()=>{

        spark.classList.remove('show')

        bigBox.classList.add('break')

        const lucky =
          randomNumber()

        bigNumber.innerText =
          lucky

        setTimeout(()=>{

          bigNumber.classList.add('show')

        },150)

        const item =
          document.createElement('div')

        item.className =
          'history-item'

        item.innerText =
          lucky

        historyEl.prepend(item)

        if(historyEl.children.length > 8){

          historyEl.removeChild(
            historyEl.lastChild
          )
        }

        playBtn.disabled = false

        playing = false

      },350)
    }

  },320)
}

</script>

</body>
</html>
