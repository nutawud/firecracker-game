<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no">

<title>🧨 จุดประทัดเสี่ยงโชค</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Kanit:wght@300;400;700&display=swap"
rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Kanit',sans-serif;
}

body{

  background:
    linear-gradient(
      rgba(180,0,0,.65),
      rgba(60,0,0,.88)
    ),
    url('dragon.png');

  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-blend-mode:multiply;

  animation:bgMove 20s linear infinite;

  width:100vw;
  height:100vh;

  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;

  color:white;
}

/* พื้นหลังขยับ */

@keyframes bgMove{

  0%{
    background-position:center top;
  }

  50%{
    background-position:center bottom;
  }

  100%{
    background-position:center top;
  }
}

.container{

  width:100%;
  height:95vh;

  max-width:520px;

  padding:10px;

  text-align:center;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* หัว */

.title{

  font-family:'Chonburi',cursive;

  font-size:30px;
  letter-spacing:2px;

  color:#ffd54f;

  text-shadow:
    0 0 10px orange,
    0 0 25px red;

  margin-bottom:12px;
}

/* คำอธิษฐาน */

.sub{

  background:
    rgba(255,255,255,.06);

  border:
    1px solid rgba(255,255,255,.1);

  border-radius:20px;

  padding:14px;

  line-height:1.6;

  font-size:16px;

  text-align:left;

  max-height:160px;

  backdrop-filter:blur(10px);

  margin-bottom:10px;
}

/* พื้นที่ประทัด */

.firecracker-wrap{

  width:270px;
  height:500px;

  position:relative;

  margin:auto;
}

/* กล่อง */

.big-box{

  position:absolute;

  top:0;
  left:50%;

  transform:translateX(-50%);

  width:190px;
  height:120px;

  border-radius:22px;

  background:
    linear-gradient(
      to bottom,
      #ff2d2d,
      #7f0000
    );

  border:5px solid #ffd54f;

  display:flex;
  justify-content:center;
  align-items:center;

  font-size:50px;
  font-weight:bold;

  color:#ffd54f;

  box-shadow:
    0 0 20px rgba(255,215,0,.5),
    inset 0 0 20px rgba(255,255,255,.1);

  transition:.4s;

  z-index:9;
}

/* กล่องแตก */

.big-box.break{

  opacity:0;

  transform:
    translateX(-50%)
    scale(1.8)
    rotate(15deg);

  filter:
    brightness(2)
    blur(6px);
}

/* เลข */

.big-number{

  position:absolute;

  top:5px;
  left:50%;

  transform:
    translateX(-50%)
    scale(.2);

  opacity:0;

  font-size:220px;
  font-weight:bold;

  color:#ffd54f;

  text-shadow:
    0 0 10px #fff,
    0 0 20px orange,
    0 0 40px red;

  transition:.4s;
}

.big-number.show{

  opacity:1;

  transform:
    translateX(-50%)
    scale(1);
}

/* ฉนวน */

.fuse{

  position:absolute;

  left:50%;
  top:90px;

  width:8px;
  height:340px;

  transform:translateX(-50%);

  border-radius:20px;

  background:
    repeating-linear-gradient(
      to bottom,
      #c49a6c 0px,
      #8b5a2b 8px,
      #5c3b1e 16px
    );

  box-shadow:
    inset 0 0 4px rgba(255,255,255,.2),
    0 0 8px rgba(0,0,0,.5);

  transition:.3s linear;
}

/* ประทัด */

.cracker{

  position:absolute;

  width:55px;
  height:85px;

  background:
    url('https://img2.pic.in.th/firecracker.png');

  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;

  transition:.35s;

  filter:
    drop-shadow(0 0 10px rgba(0,0,0,.5));
}

/* ระเบิด */

.cracker.hide{

  opacity:0;

  transform:
    scale(.1)
    rotate(180deg);

  filter:
    brightness(2)
    blur(5px);
}

/* ฝั่งซ้าย */

.left1{
  left:60px;
  top:120px;
  transform:rotate(5deg);
}

.left2{
  left:50px;
  top:200px;
  transform:rotate(5deg);
}

.left3{
  left:40px;
  top:280px;
  transform:rotate(5deg);
}

.left4{
  left:30px;
  top:360px;
  transform:rotate(5deg);
}

/* ฝั่งขวา */

.right1{
  right:65px;
  top:120px;
  transform:rotate(-78deg);
}

.right2{
  right:55px;
  top:200px;
  transform:rotate(-78deg);
}

.right3{
  right:45px;
  top:280px;
  transform:rotate(-78deg);
}

.right4{
  right:35px;
  top:360px;
  transform:rotate(-78deg);
}

/* ไฟ */

.spark{

  position:absolute;

  left:50%;
  top:390px;

  transform:translateX(-50%);

  width:22px;
  height:22px;

  border-radius:50%;

  display:none;

  background:
    radial-gradient(
      circle,
      #fff 0%,
      #ffd54f 30%,
      orange 60%,
      red 100%
    );

  box-shadow:
    0 0 10px #fff,
    0 0 20px orange,
    0 0 35px red;

  animation:
    fire .08s infinite alternate;
}

.spark.show{
  display:block;
}

/* ไม่มีเครื่องหมายกากบาทแล้ว */

/* ไฟกระพริบ */

@keyframes fire{

  from{
    transform:
      translateX(-50%)
      scale(1);

    opacity:.8;
  }

  to{
    transform:
      translateX(-50%)
      scale(1.35);

    opacity:1;
  }
}

/* ควัน */

.smoke{

  position:absolute;

  width:35px;
  height:35px;

  background:
    radial-gradient(
      circle,
      rgba(255,255,255,.7),
      rgba(255,255,255,.05)
    );

  border-radius:50%;

  filter:blur(6px);

  animation:
    smoke 1.2s linear forwards;
}

@keyframes smoke{

  from{

    opacity:1;

    transform:
      translateY(0)
      scale(1);
  }

  to{

    opacity:0;

    transform:
      translateY(-120px)
      scale(4);
  }
}

/* ปุ่ม */

button{

  margin-top:20px;

  border:none;

  padding:15px 50px;

  border-radius:20px;

  font-size:28px;
  font-weight:bold;

  color:white;

  cursor:pointer;

  background:
    linear-gradient(
      to bottom,
      #ff2d2d,
      #990000
    );

  box-shadow:
    0 10px 20px rgba(0,0,0,.4);

  transition:.2s;
}

button:hover{
  transform:scale(1.05);
}

button:disabled{
  opacity:.5;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">
    🧨 จุดประทัดเสี่ยงโชค
  </div>

  <div class="sub">

    “ข้าพเจ้า ชื่อ ....................................................

    วันนี้ได้ตั้งจิตอธิษฐานด้วยความเคารพและศรัทธา
    ขอจุดประทัดนี้เพื่อเสี่ยงทายเลขมงคล
    ขออำนาจแห่งสิ่งศักดิ์สิทธิ์ทั้งหลาย
    โปรดเปิดทางโชคลาภ เปิดทรัพย์ เปิดวาสนา
    ให้แก่ข้าพเจ้าและครอบครัว”

  </div>

  <div class="firecracker-wrap">

    <div class="big-box" id="bigBox">
      รวย
    </div>

    <div class="big-number" id="bigNumber">
      88
    </div>

    <div class="fuse" id="fuse"></div>

    <div class="cracker left1"></div>
    <div class="cracker right1"></div>

    <div class="cracker left2"></div>
    <div class="cracker right2"></div>

    <div class="cracker left3"></div>
    <div class="cracker right3"></div>

    <div class="cracker left4"></div>
    <div class="cracker right4"></div>

    <div class="spark" id="spark"></div>

  </div>

  <button id="playBtn">
    จุดประทัด
  </button>

</div>

<script>

const playBtn =
  document.getElementById('playBtn')

const spark =
  document.getElementById('spark')

const bigBox =
  document.getElementById('bigBox')

const bigNumber =
  document.getElementById('bigNumber')

const fuse =
  document.getElementById('fuse')

let playing = false

function randomNumber(){

  return Math.floor(Math.random()*100)
    .toString()
    .padStart(2,'0')
}

function createSmoke(x,y){

  const smoke =
    document.createElement('div')

  smoke.className = 'smoke'

  smoke.style.left = x + 'px'
  smoke.style.top = y + 'px'

  document.body.appendChild(smoke)

  setTimeout(()=>{
    smoke.remove()
  },1200)
}

const order = [
  'left4',
  'right4',
  'left3',
  'right3',
  'left2',
  'right2',
  'left1',
  'right1'
]

playBtn.onclick = ()=>{

  if(playing) return

  playing = true

  playBtn.disabled = true

  bigBox.classList.remove('break')

  bigNumber.classList.remove('show')

  fuse.style.clipPath =
    'inset(0 0 0 0)'

  document.querySelectorAll('.cracker')
    .forEach(c=>{
      c.classList.remove('hide')
    })

  spark.classList.add('show')

  let index = 0

  const interval = setInterval(()=>{

    if(index < order.length){

      const cracker =
        document.querySelector(
          '.' + order[index]
        )

      cracker.classList.add('hide')

      const rect =
        cracker.getBoundingClientRect()

      createSmoke(
        rect.left,
        rect.top
      )

      spark.style.top =
        cracker.offsetTop + 'px'

      const percent =
        ((index + 1)
        / order.length) * 100

      fuse.style.clipPath =
        `inset(0 0 ${percent}% 0)`

      index++

    }else{

      clearInterval(interval)

      spark.style.top = '70px'

      setTimeout(()=>{

        spark.classList.remove('show')

        bigBox.classList.add('break')

        const lucky =
          randomNumber()

        bigNumber.innerText =
          lucky

        setTimeout(()=>{

          bigNumber.classList.add('show')

        },150)

        playBtn.disabled = false

        playing = false

      },350)
    }

  },320)
}

</script>

</body>
</html>
